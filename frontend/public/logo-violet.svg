<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="violetGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="darkViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer Shield -->
  <path d="M256 32 C256 32, 430 70, 450 240 C470 410, 256 480, 256 480 C256 480, 42 410, 62 240 C82 70, 256 32, 256 32 Z" fill="#0E1421" stroke="url(#darkViolet)" stroke-width="8" filter="url(#glow)"/>

  <!-- Inner Shield -->
  <path d="M256 56 C256 56, 400 88, 416 230 C432 372, 256 448, 256 448 C256 448, 80 372, 96 230 C112 88, 256 56, 256 56 Z" fill="url(#darkViolet)" opacity="0.3"/>

  <!-- Crest -->
  <path d="M256 96 C160 96, 150 180, 110 200 C160 150, 210 140, 256 140 C302 140, 352 150, 402 200 C362 180, 352 96, 256 96 Z" fill="url(#violetGlow)" filter="url(#glow)"/>

  <!-- Helmet Body -->
  <path d="M150 240 C150 170, 200 160, 256 160 C312 160, 362 170, 362 240 C362 310, 320 400, 256 400 C192 400, 150 310, 150 240 Z" fill="url(#violetGlow)"/>
  
  <!-- Face Opening -->
  <path d="M190 240 L240 240 L240 310 L200 310 Z" fill="#080c14" />
  <path d="M322 240 L272 240 L272 310 L312 310 Z" fill="#080c14" />
  
  <!-- Center Line Guard -->
  <rect x="246" y="230" width="20" height="120" fill="url(#accent)" rx="6"/>
  
  <!-- Cheeks Bottom Accent -->
  <path d="M226 400 L256 440 L286 400 Z" fill="url(#accent)" />
  
  <!-- Eye slits glowing -->
  <path d="M200 250 L230 250 L230 260 L205 260 Z" fill="#ffffff" opacity="0.8"/>
  <path d="M312 250 L282 250 L282 260 L307 260 Z" fill="#ffffff" opacity="0.8"/>
</svg>
